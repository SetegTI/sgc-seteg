<!DOCTYPE html>
<html>
<head>
  <title>Teste Firebase</title>
</head>
<body>
  <h1>Teste de Conexão Firebase</h1>
  <div id="status">Carregando...</div>
  <div id="dados"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBK-4VEMXFiWk2rJ8gGUJRRNKDQDyi_5I",
      authDomain: "cartografia-9ca7b.firebaseapp.com",
      databaseURL: "https://cartografia-9ca7b-default-rtdb.firebaseio.com",
      projectId: "cartografia-9ca7b",
      storageBucket: "cartografia-9ca7b.firebasestorage.app",
      messagingSenderId: "950518445545",
      appId: "1:950518445545:web:1616cb2587b32c10c6c778",
    };

    try {
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      
      document.getElementById('status').innerHTML = '✅ Firebase conectado!';
      
      // Testar leitura de acessos
      const snapshot = await get(ref(db, 'acessos/482913'));
      if (snapshot.exists()) {
        document.getElementById('dados').innerHTML = '✅ Dados encontrados: ' + JSON.stringify(snapshot.val());
      } else {
        document.getElementById('dados').innerHTML = '❌ Código não encontrado';
      }
    } catch (error) {
      document.getElementById('status').innerHTML = '❌ Erro: ' + error.message;
      console.error(error);
    }
  </script>
</body>
</html>
